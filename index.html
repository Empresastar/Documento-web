<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Total Share</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --me-bg: #dcf8c6; --them-bg: #ffffff; --win-bg: #e5ddd5; }
        body { font-family: 'Segoe UI', sans-serif; background: #222; margin: 0; display: flex; justify-content: center; height: 100vh; }
        .app { width: 100%; max-width: 450px; background: var(--win-bg); display: flex; flex-direction: column; }
        
        .header { background: #075e54; color: white; padding: 15px; text-align: center; }
        #status { font-size: 0.8em; color: #25d366; }

        #chat { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px; border-radius: 10px; max-width: 80%; font-size: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .me { align-self: flex-end; background: var(--me-bg); }
        .them { align-self: flex-start; background: var(--them-bg); }

        .download-btn { 
            display: block; background: #25d366; color: white; text-align: center; 
            padding: 10px; border-radius: 5px; text-decoration: none; font-weight: bold; margin-top: 5px;
        }

        .controls { background: #f0f0f0; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .row { display: flex; gap: 5px; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        button { background: #128c7e; color: white; border: none; padding: 10px 15px; border-radius: 20px; cursor: pointer; }
        
        .id-display { font-size: 10px; text-align: center; padding: 5px; background: #eee; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <b>P2P Turbo Chat</b><br>
        <span id="status">Iniciando...</span>
    </div>
    
    <div class="id-display" id="my-id" onclick="copyId()">Seu ID: Carregando... (Clique para copiar)</div>

    <div id="chat">
        <div class="bubble them">Cole o ID do parceiro abaixo para conectar e trocar arquivos.</div>
    </div>

    <div class="controls" id="setup">
        <div class="row">
            <input type="text" id="remote-id" placeholder="ID do parceiro...">
            <button onclick="conectar()">Conectar</button>
        </div>
    </div>

    <div class="controls">
        <div class="row">
            <input type="file" id="file-input" style="display:none" onchange="enviarArquivo()">
            <button onclick="document.getElementById('file-input').click()">📎</button>
            <input type="text" id="msg-input" placeholder="Mensagem..." onkeypress="if(event.key==='Enter') enviarTexto()">
            <button onclick="enviarTexto()">➤</button>
        </div>
    </div>
</div>

<script>
    const peer = new Peer({ config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]} });
    let conn;

    peer.on('open', id => {
        document.getElementById('my-id').innerText = "SEU ID: " + id;
        document.getElementById('status').innerText = "Aguardando parceiro...";
    });

    // RECEBER CONEXÃO
    peer.on('connection', c => {
        conn = c;
        vincularEventos();
    });

    // INICIAR CONEXÃO
    function conectar() {
        const id = document.getElementById('remote-id').value;
        if (!id) return alert("Insira o ID!");
        conn = peer.connect(id);
        vincularEventos();
    }

    function vincularEventos() {
        conn.on('open', () => {
            document.getElementById('status').innerText = "CONECTADO!";
            document.getElementById('setup').style.display = "none";
            addBubble("Sistema", "Conexão P2P ativa!", "them");
        });

        conn.on('data', data => {
            if (data.type === 'text') {
                addBubble("Amigo", data.val, "them");
            } else if (data.type === 'file') {
                // Lógica de Download
                const blob = new Blob([data.payload], { type: data.fileType });
                const url = URL.createObjectURL(blob);
                const btnHtml = `<br><a href="${url}" download="${data.fileName}" class="download-btn">⬇️ BAIXAR ${data.fileName}</a>`;
                addBubble("Amigo", "Enviou um arquivo:" + btnHtml, "them", true);
            }
        });
    }

    function enviarTexto() {
        const input = document.getElementById('msg-input');
        if (!conn || !input.value) return;
        conn.send({ type: 'text', val: input.value });
        addBubble("Eu", input.value, "me");
        input.value = "";
    }

    function enviarArquivo() {
        const file = document.getElementById('file-input').files[0];
        if (!conn || !file) return;

        addBubble("Eu", "Enviando arquivo: " + file.name, "me");

        // Enviando o arquivo como ArrayBuffer (bruto)
        conn.send({
            type: 'file',
            payload: file,
            fileName: file.name,
            fileType: file.type
        });
    }

    function addBubble(user, text, side, isHtml = false) {
        const div = document.createElement('div');
        div.className = `bubble ${side}`;
        if (isHtml) div.innerHTML = text; else div.innerText = text;
        document.getElementById('chat').appendChild(div);
        document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
    }

    function copyId() {
        const idText = document.getElementById('my-id').innerText.split(": ")[1];
        navigator.clipboard.writeText(idText);
        alert("ID copiado!");
    }
</script>
</body>
              </html>
